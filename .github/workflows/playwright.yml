name: Playwright Visual Tests

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.razor'
      - '**/*.css'
      - 'src/AiTeam.Tests.Playwright/**'

env:
  REGISTRY: ghcr.io

jobs:
  playwright-test:
    name: Playwright UI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # 允許在 PR 留 comment

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Playwright project
        run: dotnet restore src/AiTeam.Tests.Playwright/AiTeam.Tests.Playwright.csproj

      - name: Build Playwright project
        run: dotnet build src/AiTeam.Tests.Playwright/AiTeam.Tests.Playwright.csproj --no-restore -c Release

      - name: Install Playwright browsers
        run: |
          pwsh src/AiTeam.Tests.Playwright/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Start Dashboard (Docker)
        env:
          POSTGRES_PASSWORD: ci-test-password
          DISCORD_BOT_TOKEN: dummy
          DISCORD_GUILD_ID: "0"
          GITHUB_PAT: dummy
          GITHUB_WEBHOOK_SECRET: dummy
          BOT_INTERNAL_API_KEY: test-key
          DASHBOARD_ADMIN_EMAIL: ${{ secrets.DASHBOARD_TEST_USER }}
          DASHBOARD_ADMIN_PASSWORD: ${{ secrets.DASHBOARD_TEST_PASS }}
        run: |
          # external volume 在 CI 環境不存在，先建立
          docker volume create aiteam-postgres-data 2>/dev/null || true
          # 啟動 postgres + dashboard（dashboard 依賴 postgres healthy）
          docker compose -f docker-compose.prod.yml up -d postgres aiteam-dashboard
          # 等待 Dashboard 就緒（最多 90 秒）
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5051/ 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "302" ]; then
              echo "Dashboard is up (HTTP $status)"
              break
            fi
            echo "Waiting... ($i/30) status=$status"
            sleep 3
          done

      - name: Run Playwright tests
        env:
          DASHBOARD_URL: http://localhost:5051
          DASHBOARD_USER: ${{ secrets.DASHBOARD_TEST_USER }}
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_TEST_PASS }}
        run: |
          dotnet test src/AiTeam.Tests.Playwright/AiTeam.Tests.Playwright.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=results.trx" \
            -- MSTest.Parallelize.Enabled=false

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: src/AiTeam.Tests.Playwright/screenshots/
          if-no-files-found: ignore

      - name: Post screenshots to PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const screenshotDir = 'src/AiTeam.Tests.Playwright/screenshots';

            if (!fs.existsSync(screenshotDir)) {
              console.log('No screenshots found');
              return;
            }

            const files = fs.readdirSync(screenshotDir)
              .filter(f => f.endsWith('.png'))
              .slice(0, 10); // 最多顯示 10 張

            if (files.length === 0) {
              console.log('No PNG screenshots found');
              return;
            }

            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## 📸 Playwright 視覺截圖測試結果\n\n`;
            body += `**狀態**：${{ job.status == 'success' && '✅ 全部通過' || '❌ 有測試失敗' }}\n\n`;
            body += `完整截圖：[下載 Artifacts](${runUrl})\n\n`;
            body += `| 截圖 |\n|------|\n`;
            files.forEach(f => {
              body += `| \`${f}\` |\n`;
            });

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Stop Dashboard
        if: always()
        run: docker compose -f docker-compose.prod.yml down aiteam-dashboard || true
