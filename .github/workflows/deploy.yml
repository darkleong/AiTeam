name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BOT:       ghcr.io/${{ github.repository_owner }}/aiteam-bot
  IMAGE_DASHBOARD: ghcr.io/${{ github.repository_owner }}/aiteam-dashboard

jobs:
  # ─── Job 1：Build & Test（雲端 Ubuntu）─────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ─── Job 2：Docker Build & Push（雲端 Ubuntu）──────────────────────────────
  # 使用 GITHUB_TOKEN（自動提供），不需手動建立 GHCR_TOKEN
  build-and-push:
    name: Build & Push Images
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 允許推送到 ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 自動提供，不需手動設定

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AiTeam.Bot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BOT }}:latest
            ${{ env.IMAGE_BOT }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AiTeam.Dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_DASHBOARD }}:latest
            ${{ env.IMAGE_DASHBOARD }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── Job 3：Deploy（Self-hosted Runner，直接在這台機器上執行）───────────────
  # 不需要 SSH、不需要 Tailscale、不需要額外 Secret
  # Runner 就在這台機器上，直接執行 docker compose
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest images
        shell: powershell
        run: docker compose -f "$env:GITHUB_WORKSPACE\docker-compose.prod.yml" --env-file "$env:USERPROFILE\aiteam\.env" pull

      - name: Restart services
        shell: powershell
        run: docker compose -f "$env:GITHUB_WORKSPACE\docker-compose.prod.yml" --env-file "$env:USERPROFILE\aiteam\.env" up -d --force-recreate

      - name: Clean up old images
        shell: powershell
        run: docker image prune -f

      - name: Record deployment
        shell: powershell
        run: |
          $body = @{
            project    = "${{ github.repository }}"
            ref        = "${{ github.ref_name }}"
            sha        = "${{ github.sha }}"
            status     = "success"
            triggeredBy = "github-actions"
          } | ConvertTo-Json
          try {
            Invoke-RestMethod -Uri "http://localhost:5052/internal/deployment" `
              -Method POST `
              -Headers @{ "X-Api-Key" = "${{ secrets.BOT_INTERNAL_API_KEY }}" } `
              -ContentType "application/json" `
              -Body $body
            Write-Host "Deployment record written."
          } catch {
            Write-Warning "Failed to write deployment record (non-blocking): $_"
          }
